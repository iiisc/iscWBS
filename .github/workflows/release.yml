# ─────────────────────────────────────────────────────────────────────────────
# iscWBS — Release workflow
#
# Triggers
#   • Manual  : Actions → Run workflow  (enter version + optional pre-release flag)
#   • Automatic: push a tag matching v#.#.#  (e.g. git tag v1.2.0 && git push --tags)
#
# Outputs a self-contained single-file EXE for x64, then publishes a GitHub Release.
# Users update the app by simply replacing the EXE; project data lives in the
# location chosen at project-creation time (default: Documents\iscWBS Projects\)
# and is never stored alongside the executable.
#
# ── Code-signing (optional) ──────────────────────────────────────────────────
# Without secrets the executable is unsigned and Windows SmartScreen may warn
# on first launch.
#
# To sign with a real certificate add two repository secrets
# (Settings → Secrets → Actions):
#
#   SIGNING_CERTIFICATE          Base-64–encoded PFX file
#                                PowerShell: [Convert]::ToBase64String([IO.File]::ReadAllBytes('cert.pfx'))
#
#   SIGNING_CERTIFICATE_PASSWORD PFX password
#
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.2.3 — no v prefix)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT: 'iscWBS.csproj'

jobs:
  release:
    runs-on: windows-latest

    steps:
      # ── 1. Source ───────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Resolve version ──────────────────────────────────────────────────
      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $v = if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
                   '${{ inputs.version }}'
               } else {
                   '${{ github.ref_name }}'.TrimStart('v')
               }
          Write-Host "Building version $v"
          "VERSION=$v" >> $env:GITHUB_OUTPUT
          "TAG=v$v"    >> $env:GITHUB_OUTPUT

      # ── 3. Toolchain ────────────────────────────────────────────────────────
      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # ── 4. Publish ──────────────────────────────────────────────────────────
      - name: Publish
        run: >
          dotnet publish ${{ env.PROJECT }}
          -c Release
          -r win-x64
          -p:Platform=x64
          --self-contained
          -p:PublishSingleFile=true
          -p:Version=${{ steps.ver.outputs.VERSION }}
          "-p:PublishDir=${{ github.workspace }}\bin\Release\publish\"

      # ── 5. Rename and locate EXE ────────────────────────────────────────────
      - name: Locate EXE
        id: exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse -Filter 'iscWBS.exe' |
                 Where-Object { $_.FullName -notmatch '\\obj\\' } |
                 Select-Object -First 1
          if (-not $exe) { throw 'iscWBS.exe was not found after publish' }
          Write-Host "Found EXE at: $($exe.FullName)"
          $dst = Join-Path $exe.DirectoryName "iscWBS-${{ steps.ver.outputs.VERSION }}-x64.exe"
          Rename-Item $exe.FullName $dst
          "EXE=$dst" >> $env:GITHUB_OUTPUT

      # ── 6. Publish release ──────────────────────────────────────────────────
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.TAG }}
          name: 'iscWBS ${{ steps.ver.outputs.VERSION }}'
          prerelease: ${{ inputs.prerelease || false }}
          generate_release_notes: true
          make_latest: true
          files: ${{ steps.exe.outputs.EXE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

