# ─────────────────────────────────────────────────────────────────────────────
# iscWBS — Release workflow
#
# Triggers
#   • Manual  : Actions → Run workflow  (enter version + optional pre-release flag)
#   • Automatic: push a tag matching v#.#.#  (e.g. git tag v1.2.0 && git push --tags)
#
# Outputs a signed MSIX for x64 and ARM64, then publishes a GitHub Release.
#
# ── Code-signing secrets (optional) ─────────────────────────────────────────
# Without secrets an ephemeral self-signed certificate is used.
# Users will see an "Unknown Publisher" trust prompt on first install.
#
# To sign with a real certificate add two repository secrets
# (Settings → Secrets → Actions):
#
#   SIGNING_CERTIFICATE          Base-64–encoded PFX file
#                                PowerShell: [Convert]::ToBase64String([IO.File]::ReadAllBytes('cert.pfx'))
#
#   SIGNING_CERTIFICATE_PASSWORD PFX password
#
# The Publisher in Package.appxmanifest must match the certificate Subject.
# Current manifest Publisher: CN=ISC
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.2.3 — no v prefix)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT: 'iscWBS.csproj'
  PACKAGE_DIR: 'AppxPackages'
  # Must match Package.appxmanifest Identity/Publisher when using the
  # self-signed fallback certificate.
  MANIFEST_PUBLISHER: 'CN=ISC'

jobs:
  release:
    runs-on: windows-latest

    steps:
      # ── 1. Source ───────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Resolve version ──────────────────────────────────────────────────
      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $v = if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
                   '${{ inputs.version }}'
               } else {
                   '${{ github.ref_name }}'.TrimStart('v')
               }
          Write-Host "Building version $v"
          "VERSION=$v" >> $env:GITHUB_OUTPUT
          "TAG=v$v"    >> $env:GITHUB_OUTPUT

      # ── 3. Stamp version into manifest ─────────────────────────────────────
      - name: Stamp Package.appxmanifest
        shell: pwsh
        run: |
          $v = '${{ steps.ver.outputs.VERSION }}'
          [xml]$m = Get-Content 'Package.appxmanifest'
          $m.Package.Identity.Version = "$v.0"
          $m.Save('Package.appxmanifest')
          Write-Host "Manifest version → $v.0"

      # ── 4. Toolchain ────────────────────────────────────────────────────────
      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # ── 5. Restore ──────────────────────────────────────────────────────────
      - name: Restore NuGet packages
        run: dotnet restore ${{ env.PROJECT }}

      # ── 6. Signing certificate ──────────────────────────────────────────────
      - name: Prepare signing certificate
        id: cert
        shell: pwsh
        env:
          B64_CERT: ${{ secrets.SIGNING_CERTIFICATE }}
          CERT_SECRET_PWD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          if ($env:B64_CERT) {
            Write-Host "Using repository signing certificate."
            [IO.File]::WriteAllBytes('sign.pfx', [Convert]::FromBase64String($env:B64_CERT))
            "CERT_PWD=$env:CERT_SECRET_PWD" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "::notice::SIGNING_CERTIFICATE secret not set — creating ephemeral self-signed certificate."
            $ephemeralPwd = 'iscwbs-ephemeral-build'
            $cert = New-SelfSignedCertificate `
              -Type Custom `
              -Subject '${{ env.MANIFEST_PUBLISHER }}' `
              -KeyUsage DigitalSignature `
              -FriendlyName 'iscWBS' `
              -CertStoreLocation 'Cert:\CurrentUser\My' `
              -TextExtension @('2.5.29.37={text}1.3.6.1.5.5.7.3.3', '2.5.29.19={text}')
            Export-PfxCertificate `
              -Cert "Cert:\CurrentUser\My\$($cert.Thumbprint)" `
              -FilePath 'sign.pfx' `
              -Password (ConvertTo-SecureString -String $ephemeralPwd -Force -AsPlainText) | Out-Null
            "CERT_PWD=$ephemeralPwd" >> $env:GITHUB_OUTPUT
          }

      # ── 7. Build ─────────────────────────────────────────────────────────────
      - name: Build MSIX — x64
        shell: pwsh
        env:
          CERT_PWD: ${{ steps.cert.outputs.CERT_PWD }}
        run: |
          msbuild '${{ env.PROJECT }}' `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:AppxBundle=Never `
            /p:UapAppxPackageBuildMode=SideloadOnly `
            /p:AppxPackageSigningEnabled=true `
            /p:PackageCertificateKeyFile=sign.pfx `
            "/p:PackageCertificatePassword=$env:CERT_PWD" `
            /p:AppxPackageDir=${{ env.PACKAGE_DIR }}\

      - name: Build MSIX — ARM64
        shell: pwsh
        env:
          CERT_PWD: ${{ steps.cert.outputs.CERT_PWD }}
        run: |
          msbuild '${{ env.PROJECT }}' `
            /p:Configuration=Release `
            /p:Platform=ARM64 `
            /p:AppxBundle=Never `
            /p:UapAppxPackageBuildMode=SideloadOnly `
            /p:AppxPackageSigningEnabled=true `
            /p:PackageCertificateKeyFile=sign.pfx `
            "/p:PackageCertificatePassword=$env:CERT_PWD" `
            /p:AppxPackageDir=${{ env.PACKAGE_DIR }}\

      # ── 8. Locate outputs ───────────────────────────────────────────────────
      - name: Locate MSIX files
        id: msix
        shell: pwsh
        run: |
          $all   = Get-ChildItem -Path '${{ env.PACKAGE_DIR }}' -Filter '*.msix' -Recurse
          $x64   = ($all | Where-Object FullName -Match '_x64_'   | Select-Object -First 1).FullName
          $arm64 = ($all | Where-Object FullName -Match '_ARM64_'  | Select-Object -First 1).FullName
          if (-not $x64)   { Write-Error 'x64 MSIX not found';   exit 1 }
          if (-not $arm64)  { Write-Error 'ARM64 MSIX not found'; exit 1 }
          Write-Host "x64   → $x64"
          Write-Host "ARM64 → $arm64"
          "X64=$x64"     >> $env:GITHUB_OUTPUT
          "ARM64=$arm64" >> $env:GITHUB_OUTPUT

      # ── 9. Publish release ──────────────────────────────────────────────────
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.TAG }}
          name: 'iscWBS ${{ steps.ver.outputs.VERSION }}'
          prerelease: ${{ inputs.prerelease || false }}
          generate_release_notes: true
          make_latest: true
          files: |
            ${{ steps.msix.outputs.X64 }}
            ${{ steps.msix.outputs.ARM64 }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 10. Cleanup ─────────────────────────────────────────────────────────
      - name: Remove certificate
        if: always()
        shell: pwsh
        run: Remove-Item -Force -ErrorAction SilentlyContinue sign.pfx
